<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description"
    content="FrequencyGenerator — Generate and control precise audio tones from 1Hz to 22000Hz directly in your browser." />
  <title>FrequencyGenerator</title>
  <link rel="icon" href="icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app" id="app">

    <header class="header" role="banner">
      <h1 class="logo" aria-label="FrequencyGenerator">
        <span class="logo-freq">Frequency</span><span class="logo-gen">Generator</span>
      </h1>
    </header>

    <main class="main-content">

      <section class="visualizer-section" aria-label="Waveform visualization">
        <canvas id="waveCanvas" class="wave-canvas" aria-hidden="true"></canvas>
      </section>

      <section class="controls-section">

        <div class="controls-row controls-row--top">
          <button class="icon-btn control-btn" id="channelBtn" aria-label="Toggle L/R channel" aria-pressed="false">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
              <rect x="1" y="6" width="8" height="10" rx="2" stroke="currentColor" stroke-width="1.5" />
              <rect x="13" y="6" width="8" height="10" rx="2" stroke="currentColor" stroke-width="1.5" />
              <line x1="9" y1="11" x2="13" y2="11" stroke="currentColor" stroke-width="1.5" />
              <text x="3" y="13" font-size="4" fill="currentColor" font-family="Inter,sans-serif"
                font-weight="600">L</text>
              <text x="15" y="13" font-size="4" fill="currentColor" font-family="Inter,sans-serif"
                font-weight="600">R</text>
            </svg>
          </button>
          <div class="spacer"></div>

        </div>

        <div class="controls-row controls-row--mid">
          <div class="volume-group">
            <button class="icon-btn control-btn" id="volumeBtn" aria-label="Volume control" aria-expanded="false">
              <svg id="volumeIcon" width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
                <path d="M7 8H3a1 1 0 00-1 1v4a1 1 0 001 1h4l5 4V4L7 8z" fill="currentColor" />
                <path d="M15.5 7.5a5 5 0 010 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                <path d="M18 5a9 9 0 010 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg>
            </button>
          </div>

          <div class="freq-display">
            <input type="number" class="freq-value" id="freqValue" min="1" max="22000" step="1" value="440"
              aria-label="Frequency in Hz — click to change" aria-live="polite" inputmode="numeric" />
            <span class="freq-unit">Hz</span>
          </div>

          <button class="icon-btn control-btn" id="waveBtn" aria-label="Change waveform type">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
              <path d="M2 11 Q5 4 8 11 Q11 18 14 11 Q17 4 20 11" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" fill="none" />
            </svg>
          </button>
        </div>

        <div class="slider-section">
          <input type="range" id="freqSlider" class="freq-slider" min="0" max="1000" value="551" step="1"
            aria-label="Frequency" aria-valuemin="1" aria-valuemax="22000" aria-valuenow="440"
            aria-valuetext="440 Hz" />
          <div class="slider-labels" aria-hidden="true">
            <span>1Hz</span>
            <span>22kHz</span>
          </div>
        </div>

        <div class="bottom-controls">
          <button class="icon-btn step-btn" id="decrementBtn" aria-label="Decrease frequency by 1 Hz">
            <svg width="18" height="4" viewBox="0 0 18 4" fill="none" aria-hidden="true">
              <line x1="1" y1="2" x2="17" y2="2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
            </svg>
          </button>

          <button class="stop-btn" id="playStopBtn" aria-label="Play tone" aria-pressed="false">
            <svg id="playIcon" width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
              <polygon points="6,4 18,11 6,18" fill="currentColor" />
            </svg>
            <svg id="stopIcon" width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true"
              style="display:none">
              <rect x="4" y="4" width="14" height="14" rx="2" fill="currentColor" />
            </svg>
          </button>

          <button class="icon-btn step-btn" id="incrementBtn" aria-label="Increase frequency by 1 Hz">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <line x1="9" y1="1" x2="9" y2="17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
              <line x1="1" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
            </svg>
          </button>
        </div>
      </section>
    </main>

  </div>

  <div class="volume-panel" id="volumePanel" role="dialog" aria-label="Volume" hidden>
    <input type="range" class="volume-slider-vert" id="volumeSlider" min="0" max="100" value="100" step="1"
      aria-label="Volume level" />
  </div>

  </div>

  <script src="app.js"></script>
</body>

</html>
